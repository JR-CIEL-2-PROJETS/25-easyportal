events {}

http {
    include       mime.types;
    default_type  application/octet-stream;

    types {
        application/javascript js;
    }

    server {
        listen 80;
        server_name localhost;

        root /code;  # Chemin correct pour servir les fichiers
        index index.html index.php;  # Ajout de index.html

        # Serveur pour les fichiers statiques (ex: CSS, JS, images)
        location /assets/ {
            alias /code/assets/;  # Utilisation de "alias" au lieu de "root" pour les assets
            try_files $uri $uri/ =404;
        }

        # Traitement des fichiers PHP
        location ~ \.php$ {
            fastcgi_pass php:9000;  # php est le nom du service Docker dans Compose
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME /code$fastcgi_script_name;  # Correction du chemin
            include fastcgi_params;
        }

        # Route principale pour servir les fichiers HTML/PHP
        location / {
            try_files $uri $uri/ =404;
        }

        # Gestion des erreurs (facultatif mais recommandé)
        error_page 404 /404.html;
        error_page 500 502 503 504 /50x.html;
        location = /404.html {
            root /code;
        }
        location = /50x.html {
            root /code;
        }
    }
}
