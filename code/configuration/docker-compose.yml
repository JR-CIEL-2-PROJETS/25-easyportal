version: '3'

services:
  nginx:
    image: nginx:1.22-alpine
    ports:
      - "8080:80"  # Expose le port 80 du conteneur sur le port 8080 de la machine hôte
    volumes:
      - ./code:/code  # Monte ton dossier 'code' dans le conteneur
      - ./nginx.conf:/etc/nginx/nginx.conf  # Monte ton fichier nginx.conf dans le conteneur
    depends_on:
      - php  # Nginx dépend de PHP pour traiter les fichiers PHP

  php:
    build: .  # Utilise ton Dockerfile pour construire l'image PHP
    volumes:
      - ./code:/code  # Monte ton dossier 'code' dans le conteneur PHP
    expose:
      - "9000"  # Le port sur lequel PHP-FPM écoute

  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: appdb
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    volumes:
      - dbdata:/var/lib/mysql  # Volume pour stocker les données MySQL
    ports:
      - "3306:3306"  # Expose le port 3306 pour accéder à MySQL depuis l'hôte

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    environment:
      PMA_HOST: mysql
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "8081:80"

volumes:
  dbdata:   # volume managé pour sauvegarder la bdd en local